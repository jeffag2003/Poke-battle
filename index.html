<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poke-Battle | Stage 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="trainer-section"></header>
   
    <main class="selector-arena">    
        <section id="player-pokemon" class="side-container">
            </section>
        <section class="controls-center">
            <div class="search-box">
                <label for="opponent-search">BUSCAR OPONENTE</label>
                <input 
                    type="text" 
                    id="opponent-search" 
                    placeholder="Ej: Pikachu"
                    autocomplete="off" >
            </div>
            <div class="vs-divider">VS</div>
            <button id="go-to-battle" disabled>
                ¡IR A LA BATALLA!
            </button>
        </section>
        <section id="opponent-pokemon" class="side-container">
            <div class="placeholder-text">
                Esperando oponente...
            </div>
        </section>
    </main>
    <script type="module" src="stage-1/main.js"></script>
    
</body>
</html>
