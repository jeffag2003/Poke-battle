<!DOCTYPE html>
<html lang="es">
<head>

    <title>Pokémon Battle - Stage 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="trainer-section"></div>

    <div class="selection-screen">

            <button id="go-to-battle" disabled>¡A LA BATALLA!</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
